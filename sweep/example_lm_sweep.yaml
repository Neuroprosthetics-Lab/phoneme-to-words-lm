#     params:
#       beam_size: 500
#       token_beam_size: 15
#       beam_threshold: 20.0
#       blank_skip_threshold: 0.95
#       blank_penalty: 5.0
#       temperature: 1.0
#       lm_weight: 2.0
#       n_best: 50
#       llm_length_penalty: 0.0
#       llm_model_name: "Qwen/Qwen3.5-4B"
